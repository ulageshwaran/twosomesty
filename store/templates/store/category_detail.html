{% extends "store/base.html" %}

{% block title %}Buy {{ category.name }} Online in Chennai | Twosomesty{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto">
    <!-- Breadcrumb -->
    <nav class="flex mb-6 text-sm text-customText-gray">
        <a href="{% url 'store:home' %}" class="hover:text-brand transition">Home</a>
        <span class="mx-2">/</span>
        <span class="text-customText-white">{{ category.name }}</span>
    </nav>

    <!-- Header Section with Sorting -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10">
        <div>
            <h1 class="text-4xl font-extrabold text-customText-white font-fredoka">{{ category.name }}</h1>
        </div>
        
        <!-- Sorting dropdown (powered by HTMX) -->
        <div class="flex items-center space-x-3">
            <label for="sort" class="text-xs font-bold text-customText-gray uppercase tracking-wider whitespace-nowrap leading-none">Sort By:</label>
            <select name="sort" id="sort" 
                    hx-get="{% url 'store:category_detail' category.slug %}"
                    hx-target="#product-grid"
                    hx-swap="outerHTML"
                    hx-push-url="true"
                    hx-trigger="change"
                    class="bg-surface-card border border-surface-border rounded-xl px-3.5 py-2 text-xs font-semibold text-customText-white focus:outline-none focus:border-brand transition cursor-pointer">
                <option value="newest" {% if selected_sort == 'newest' %}selected{% endif %}>Newest Arrivals</option>
                <option value="price_asc" {% if selected_sort == 'price_asc' %}selected{% endif %}>Price: Low to High</option>
                <option value="price_desc" {% if selected_sort == 'price_desc' %}selected{% endif %}>Price: High to Low</option>
            </select>
        </div>
    </div>

    <!-- Product Grid Full Width -->
    <div class="w-full">
        <!-- Include our product grid partial -->
        {% include "store/partials/product_grid.html" %}
    </div>
</div>
{% endblock %}
